<svg width="100%" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; fill: #3d3d3a; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; fill: #5f5e5a; }
  .phase-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .phase-teal text { fill: #085041; }
  .phase-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .phase-purple text { fill: #3C3489; }
  .phase-amber rect { fill: #FAEEDA; stroke: #854F0B; }
  .phase-amber text { fill: #633806; }
  .phase-coral rect { fill: #FAECE7; stroke: #993C1D; }
  .phase-coral text { fill: #712B13; }
  .phase-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .phase-gray text { fill: #444441; }
  .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
  .divider { stroke: #D3D1C7; stroke-width: 0.5; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Phase bars -->
<g class="phase-teal">
  <rect x="40" y="40" width="140" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="110" y="62" text-anchor="middle" dominant-baseline="central">Planning</text>
</g>

<g class="phase-purple">
  <rect x="188" y="40" width="128" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="252" y="62" text-anchor="middle" dominant-baseline="central">Install</text>
</g>

<g class="phase-amber">
  <rect x="324" y="40" width="128" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="388" y="62" text-anchor="middle" dominant-baseline="central">Test</text>
</g>

<g class="phase-coral">
  <rect x="460" y="40" width="80" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="500" y="62" text-anchor="middle" dominant-baseline="central">Go-live</text>
</g>

<g class="phase-gray">
  <rect x="548" y="40" width="92" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="594" y="54" text-anchor="middle" dominant-baseline="central">Steady</text>
  <text class="th" x="594" y="70" text-anchor="middle" dominant-baseline="central">state</text>
</g>

<!-- Connectors -->
<line x1="180" y1="62" x2="186" y2="62" class="arr" marker-end="url(#arrow)"/>
<line x1="316" y1="62" x2="322" y2="62" class="arr" marker-end="url(#arrow)"/>
<line x1="452" y1="62" x2="458" y2="62" class="arr" marker-end="url(#arrow)"/>
<line x1="540" y1="62" x2="546" y2="62" class="arr" marker-end="url(#arrow)"/>

<!-- Duration labels -->
<text class="ts" x="110" y="96" text-anchor="middle" dominant-baseline="central">Longer</text>
<text class="ts" x="252" y="96" text-anchor="middle" dominant-baseline="central">Longer</text>
<text class="ts" x="388" y="96" text-anchor="middle" dominant-baseline="central">Longer</text>
<text class="ts" x="500" y="96" text-anchor="middle" dominant-baseline="central">Shorter</text>
<text class="ts" x="594" y="96" text-anchor="middle" dominant-baseline="central">Ongoing</text>

<!-- Divider -->
<line x1="40" y1="116" x2="640" y2="116" class="divider"/>

<!-- Planning activities -->
<text class="ts" x="44" y="140" dominant-baseline="central">Discovery and setup</text>
<text class="ts" x="44" y="162" dominant-baseline="central">Readiness check-in</text>
<text class="ts" x="44" y="184" dominant-baseline="central">Identify project team</text>
<text class="ts" x="44" y="206" dominant-baseline="central">Create project plan</text>
<text class="ts" x="44" y="228" dominant-baseline="central">NBS 7 orientation</text>
<text class="ts" x="44" y="250" dominant-baseline="central">Communications plan</text>
<text class="ts" x="44" y="272" dominant-baseline="central">Training plan</text>
<text class="ts" x="44" y="294" dominant-baseline="central">Draft test plan</text>

<!-- Install activities -->
<text class="ts" x="192" y="140" dominant-baseline="central">Data migration plan</text>
<text class="ts" x="192" y="162" dominant-baseline="central">Dev environment</text>
<text class="ts" x="192" y="184" dominant-baseline="central">Staging environment</text>
<text class="ts" x="192" y="206" dominant-baseline="central">Production environment</text>
<text class="ts" x="192" y="228" dominant-baseline="central">Database transfer</text>
<text class="ts" x="192" y="250" dominant-baseline="central">Roles and permissions</text>
<text class="ts" x="192" y="272" dominant-baseline="central">SSO setup</text>

<!-- Test activities -->
<text class="ts" x="328" y="140" dominant-baseline="central">Database restore</text>
<text class="ts" x="328" y="162" dominant-baseline="central">Ingestion validation</text>
<text class="ts" x="328" y="184" dominant-baseline="central">ELR ingestion testing</text>
<text class="ts" x="328" y="206" dominant-baseline="central">Notifications testing</text>
<text class="ts" x="328" y="228" dominant-baseline="central">Regression testing</text>
<text class="ts" x="328" y="250" dominant-baseline="central">Cutover review</text>
<text class="ts" x="328" y="272" dominant-baseline="central">UAT</text>

<!-- Go-live activities -->
<text class="ts" x="464" y="140" dominant-baseline="central">NBS 7 training</text>
<text class="ts" x="464" y="162" dominant-baseline="central">Go/no-go decision</text>
<text class="ts" x="464" y="184" dominant-baseline="central">Database lock</text>
<text class="ts" x="464" y="206" dominant-baseline="central">Cutover</text>

<!-- Steady state activities -->
<text class="ts" x="552" y="140" dominant-baseline="central">Monitor operations</text>
<text class="ts" x="552" y="162" dominant-baseline="central">Track performance</text>
<text class="ts" x="552" y="184" dominant-baseline="central">Upgrade releases</text>
<text class="ts" x="552" y="206" dominant-baseline="central">Ongoing support</text>

<!-- Divider before notes -->
<line x1="40" y1="322" x2="640" y2="322" class="divider"/>

<!-- Notes -->
<text class="ts" x="40" y="348" dominant-baseline="central">Bar width reflects relative effort. Actual timelines vary significantly by jurisdiction.</text>
<text class="ts" x="40" y="372" dominant-baseline="central">Security approval is the most common source of delay in the Planning phase.</text>
<text class="ts" x="40" y="396" dominant-baseline="central">Install and Test phases depend on security processes and may run concurrently in some steps.</text>
</svg>
