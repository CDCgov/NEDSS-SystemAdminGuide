aims: "APHL Informatics Messaging System. A platform managed by the Association of Public Health Laboratories (APHL) for public health data exchange and messaging."
aks: "See Azure Kubernetes Service."
amg: "Amazon Managed Grafana. An AWS-managed version of Grafana, an open-source dashboarding platform."
amp: "Amazon Managed Service for Prometheus. An AWS-managed version of Prometheus, an open-source monitoring and alerting toolkit."
api: "Application Programming Interface. A defined interface that allows software systems to communicate."
argocd: "An open-source GitOps tool for deploying and managing Kubernetes applications."
avr: "Analysis, Visualization, and Reporting. An umbrella term for the reporting and analytics capabilities of NBS and related public health systems."
aws: "Amazon Web Services. A public cloud platform. Often used with services such as Amazon EKS, Amazon MSK, Amazon EFS, Amazon RDS, Amazon S3, AWS KMS, Amazon Managed Service for Prometheus, and Amazon Managed Grafana. See also Microsoft Azure."
azure: "See Microsoft Azure."
azure-blob-storage: "An Azure service for object storage. Used for Terraform state files and logs in Azure deployments. The AWS equivalent is Amazon S3."
azure-files: "An Azure service for file storage. In Azure deployments, Azure Files and Azure NetApp Files are common options for the persistent file storage that Amazon EFS provides in AWS deployments."
azure-key-vault: "An Azure service for creating and managing encryption keys, certificates, and application and database secrets. Used to protect sensitive configuration values in Azure deployments. The Azure equivalent of AWS KMS."
azure-kubernetes-service: "An Azure-managed service for Kubernetes, commonly known as AKS. Hosts containerized services in Azure deployments. The AWS equivalent of AKS is Amazon EKS."
azure-monitor: "An Azure service for monitoring infrastructure health and performance. In Azure deployments, Azure Monitor covers the observability functions that Amazon Managed Service for Prometheus and Amazon Managed Grafana provide in AWS deployments (metrics collection and dashboard visualization). Azure Monitor includes Azure-managed Grafana as an optional dashboarding component."
azure-rbac: "Azure Role-Based Access Control. An Azure service for managing access to cloud resources. In Azure deployments, Azure RBAC controls resource-level permissions in the same way that AWS IAM does in AWS deployments. Often used in conjunction with Microsoft Entra ID for identity management."
azure-sql: "A family of Azure-managed database services. In Azure deployments, Azure SQL Database or Azure Database for SQL Server are common hosting options. The Azure equivalent of Amazon RDS in this context."
build-provenance: "Verifiable, tamper-proof metadata documenting how a software artifact was created, including source code location, dependencies, build tools, and process logs. Build provenance supports software supply chain integrity by allowing you to confirm that a given artifact was built from a known, unmodified source."
c-cda: "Consolidated Clinical Document Architecture. A broad HL7 standard for structured clinical documents, including discharge summaries and referral notes. The eICR format is a public health-specific implementation of C-CDA."
case-investigation: "A case investigation records one instance of a disease or condition for a specific person, including clinical, epidemiological, and administrative data. Investigations may use the generic form (applicable to most conditions) or a condition-specific PAM."
case-notification: "A message sent from a STLT to CDC reporting a confirmed or probable case of a nationally notifiable disease. A case notification contains case investigation data and associated observations and vaccinations."
case-surveillance: "The collection, analysis, and reporting of data on individual disease cases. NBS is a case surveillance system. Case surveillance differs from syndromic surveillance, which uses aggregate or pre-diagnostic data."
cda: "Clinical Document Architecture. An HL7 standard for structuring clinical documents for exchange. C-CDA is a US-specific implementation of CDA; eICR is a public health-specific implementation of C-CDA."
cdc: "Centers for Disease Control and Prevention. The federal agency that develops and maintains NBS. The NBS program is managed within the Office of Public Health Data, Surveillance, and Technology (OPHDST)."
cdf: "Commonly Defined Fields (also: Collaboratively Defined Fields). Custom fields in NBS that are defined collaboratively across jurisdictions, as distinct from locally defined fields (LDFs). CDFs support import versioning."
change-data-capture: "A technique for tracking row-level changes in a database and streaming them to downstream systems in near real time."
cidr: "Classless Inter-Domain Routing. A notation for specifying IP address ranges (for example, 10.0.0.0/16)."
classic-nbs: "Any NBS versions prior to 7.0.0, including all NBS 6.x releases. Classic NBS is approaching end of support. CDC is phasing out active development on NBS 6 so that resources can focus on NBS 7. STLTs still running Classic NBS should plan to migrate to NBS 7 or evaluate an alternative solution."
cli: "Command-Line Interface. A text-based interface for running commands. System admins might use several CLI tools, such as the AWS CLI, kubectl, and the Terraform CLI."
condition: "A disease or health event that is subject to public health reporting. Conditions may be nationally notifiable (reported to CDC) or only jurisdiction-level reportable."
container: "A lightweight, portable unit of software that packages an application and its dependencies so it runs consistently across environments."
container-image: "A read-only template used to create containers."
control-plane: "The component of a Kubernetes cluster that manages cluster state, including scheduling workloads and maintaining desired configuration."
crd: "Custom Resource Definition. A schema that defines validation rules for a new resource type within Kubernetes. You can use CRDs to extend the Kubernetes API with custom resource types needed by its services."
data-ingestion-pipeline: "The NBS 7 services responsible for receiving, validating, and routing incoming public health data into NBS. Accepts data in eICR, PHDC, and C-CDA formats. The pipeline includes the DI API as the entry point and integrations with Elasticsearch and the NBS operational database."
debezium: "An open-source change data capture tool."
di-api: "Data Integration API. An NBS 7 service that provides an API for external systems to push data into NBS."
dibbs: "Data Integration Building Blocks. CDC open-source middleware for public health data integration."
dns: "Domain Name System. The system that translates domain names (such as app.example.com) to IP addresses."
ecr: "Electronic Case Reporting. Automated reporting of disease cases from healthcare electronic health records (EHRs) to public health agencies."
amazon-efs: "Amazon Elastic File System. AWS-managed file storage. The Azure equivalent to EFS is Azure Files."
ehr: "Electronic Health Record. A digital system used by clinical providers to record and manage patient health information. EHRs generate eICR documents automatically when a reportable condition is diagnosed, enabling automated case reporting to public health agencies."
eicr: "Electronic Initial Case Report. A structured document automatically generated by an EHR system when a clinician diagnoses a patient with a reportable condition. eICRs send relevant clinical data directly to public health agencies without manual data entry. eICR is the modern, preferred pathway for case reporting."
amazon-eks: "Amazon Elastic Kubernetes Service. A managed Kubernetes service from AWS. Hosts containerized services in AWS deployments. In Azure deployments, AKS serves the same function."
elasticsearch: "An open-source search and analytics engine."
elr: "Electronic Lab Report. Lab results transmitted electronically from laboratories to public health departments."
etl: "Extract, Transform, Load. A batch process that moves and transforms data from one system to another."
etor: "Electronic Test Orders and Results. A public health data exchange standard for transmitting laboratory test orders and results electronically. Related to ELR but covers the ordering side as well as results."
fhir: "Fast Healthcare Interoperability Resources. A modern HL7 standard for healthcare data exchange using web APIs."
gitops: "A practice of using Git repositories as the source of truth for infrastructure and application configuration."
hdinsight: "An Azure-managed Kafka service. Used for event streaming in Azure deployments. The AWS equivalent of HDInsight is Amazon MSK."
helm: "A package manager for Kubernetes."
helm-chart: "A collection of files that define a Kubernetes application deployment, including configuration templates and default values."
hie-hin: "Health Information Exchange / Health Information Network. Organizations or networks that facilitate electronic sharing of health information across providers and public health agencies."
hl7: "Health Level Seven. A set of international standards for exchanging clinical and administrative health data."
iac: "Infrastructure as Code. The practice of managing infrastructure through code (such as Terraform scripts) rather than manual configuration."
iam: "AWS Identity and Access Management. The AWS service for controlling access to cloud resources. In Azure deployments, Microsoft Entra ID and Azure RBAC serve the same function."
idp: "Identity Provider. A system that manages user authentication and issues identity tokens."
ingress-controller: "A Kubernetes component that manages external access to services within a cluster, typically through HTTP/HTTPS routing rules."
investigation: "See case investigation. In NBS, \"investigation\" refers specifically to the record of a public health case investigation, not a general inquiry."
ird: "Investigate and Respond Division. The CDC division within OPHDST where NBS is housed, within the PHIT branch."
jurisdiction: "The geographic or programmatic scope of authority for a health department unit."
kafka: "Apache Kafka. An open-source distributed event streaming platform. Hosted on AWS as Amazon MSK or on Azure as HDInsight."
keycloak: "An open-source identity and access management tool used for managing user authentication, SSO, and token issuance."
kms: "AWS Key Management Service. The AWS service for creating and managing encryption keys. Used to encrypt data at rest. In Azure deployments, Azure Key Vault serves the same function."
kubectl: "The command-line tool for interacting with Kubernetes clusters."
kubernetes: "An open-source container orchestration platform that automates deployment, scaling, and management of containerized applications."
lab-report: "An observation originating from a laboratory, containing lab orders and results. Lab reports may arrive electronically as an ELR or be entered manually. In NBS, lab reports often trigger the creation of a case investigation."
ldf: "Locally Defined Fields. Custom fields added by an individual STLT within NBS to capture jurisdiction-specific data. LDFs are distinct from CDFs, which are shared across jurisdictions. Sysadmins configure LDFs during NBS setup and customization."
lims-lis: "Laboratory Information Management System / Laboratory Information System. Software used by laboratories to manage samples, workflows, and results. STLTs and their reporting labs use LIMS/LIS systems as the source of ELR data."
linkerd: "An open-source service mesh for Kubernetes."
load-balancer: "A component that distributes incoming network traffic across multiple servers or services."
loinc: "Logical Observation Identifiers Names and Codes. A standard code system that identifies what was measured in a lab test. Used in ELR processing and stored in the SRTE database."
managed-node-group: "A group of worker nodes in AWS that share the same configuration, such as EC2 instance type and scaling settings. The equivalent concept in AKS is a node pool."
masteretl: "The Classic NBS batch process that extracts, transforms, and loads data from the NBS operational database (ODSE) into the reporting database (RDB). MasterETL coexists with the RTR pipeline during the NBS 7 transition."
microservice: "A software architecture pattern in which an application is built as a collection of small, independently deployable services."
microsoft-azure: "A public cloud platform. Often used with services such as AKS, HDInsight, Azure Files, Azure SQL, Azure Blob Storage, Azure Key Vault, and Azure Monitor. See also AWS."
microsoft-entra-id: "An Azure identity and access management service, formerly known as Azure Active Directory. In Azure deployments, Microsoft Entra ID handles identity and authentication functions similar to AWS IAM, including user authentication and RBAC. Often used in conjunction with Azure RBAC for resource-level permissions."
mmg: "Message Mapping Guide. A CDC-published guide that defines the HL7 message structure for reporting a specific notifiable condition to CDC."
morbidity-report: "An observation originating from a healthcare provider (such as a hospital or clinic), containing basic data about one instance of a disease. Morbidity reports typically arrive by paper or non-electronic means."
mou: "Memorandum of Understanding. A formal agreement between parties. A STLT may be required to establish a MoU with new service providers."
mpr-mpi: "Master Patient Record / Master Patient Index. MPR: The authoritative patient record in NBS, derived from all patient revisions (point-in-time demographics). MPI: A cross-system index used to match and link patient records across sources."
ms-sql: "Microsoft SQL Server. The relational database used by Classic NBS (NBS 6.x). NBS 7 connects to the existing NBS 6 MS SQL database."
msgout-msgoute: "Messaging Database (Enterprise). The NBS staging database for inbound and outbound messaging. Stores electronic messages going into and out of NBS. Referenced in data ingestion pipeline configuration."
amazon-msk: "Amazon Managed Streaming for Apache Kafka. An AWS-managed version of Kafka, an open-source event streaming platform. In Azure deployments, HDInsight serves the same function."
namespace: "A logical partition within a Kubernetes cluster used to isolate resources. NBS 7 services are deployed into specific namespaces."
nbs: "National Electronic Disease Surveillance System Base System. A CDC-developed software system for public health surveillance. Helps STLTs collect, manage, and share reportable and notifiable disease data. Available as Classic NBS (NBS 6.x) and the modernized NBS 7 (the subject of this guide)."
nbs-6: "See Classic NBS."
nbs-7: "The modernized version of NBS, built as a containerized microservices platform deployed on cloud infrastructure. NBS 7 incrementally replaces Classic NBS using the strangler fig pattern, allowing STLTs to transition to the modernized system without disrupting active surveillance operations. NBS 7 is the subject of this guide."
nbs-central: "A web-based portal providing helpdesk ticketing, collaboration forums, documentation, and a wiki for the NBS community. NBS Central is a support resource, not a deployable component. Access to NBS Central requires a login. To register for an account, navigate to NBS Central and choose Register at the top of the login screen."
nedss: "National Electronic Disease Surveillance System. The federal initiative that establishes standards for electronic disease surveillance. NBS is the base system implementation of NEDSS."
netss: "National Electronic Telecommunications System for Surveillance. A legacy data exchange format for transmitting surveillance data to CDC. NETSS is being phased out in favor of more current standards."
nifi: "Apache NiFi. An open-source data flow automation tool."
nist-800-53: "National Institute of Standards and Technology Special Publication 800-53 (Rev. 5). A risk-based framework providing a catalog of security and privacy controls for federal information systems."
nnd: "National Notifiable Disease. A disease or condition that jurisdictions are required by federal policy to report to CDC. CDC maintains the national list; STLTs may also designate additional jurisdiction-level reportable conditions."
nndss: "National Notifiable Diseases Surveillance System. The CDC system that receives case notification data from STLTs."
node: "See worker node."
node-pool: "A group of worker nodes in Azure that share the same configuration, such as virtual machine size and operating system. The equivalent concept in Amazon EKS is a managed node group."
notifiable-disease: "A disease or condition that providers and laboratories are legally required to report to public health authorities. CDC maintains the national list. See also reportable disease."
observation: "In NBS, a report received by a health department from an external source (such as a lab or provider). Observations include lab reports and morbidity reports. They may trigger case investigations or be associated with existing ones."
ods-odse: "Operational Data Store (Enterprise). The NBS primary transactional database. Stores real-time case and investigation data. The \"E\" suffix reflects the current design iteration of the database schema."
on-premises: "Infrastructure that is hosted and managed at a physical location controlled by the organization, rather than in a cloud environment. Hyphenated when used as an adjective."
ophdst: "Office of Public Health Data, Surveillance, and Technology. The CDC office that oversees NBS development and houses the IRD division."
page-builder: "An NBS feature that allows administrators to build configurable forms for collecting, analyzing, and sending notifications for disease and condition data."
pam: "Program Area Module. An NBS extension that adds disease-specific data collection fields and workflows beyond the base system. Examples include PAMs for Hepatitis, STD/HIV, and Vaccine-Preventable Diseases."
peering: "A network connection between two Amazon VPCs or VNets, or between one and an on-premises network, that allows resources in each to communicate as if on the same network. In Amazon VPC, this is called VPC peering. In Azure, the equivalent is VNet peering."
permission-set: "In NBS, a collection of objects and operations a user is authorized to access. A permission set is combined with program area, jurisdiction, and access level to define a user's role."
phcr: "Public Health Case Report. An XML format used to import case data into NBS from legacy or external systems."
phdc: "Public Health Document Container. An XML document format used for structured case data exchange."
phi: "Protected Health Information. Health data protected under HIPAA."
phin: "Public Health Information Network. A CDC initiative establishing standards and tools for public health information exchange. The parent initiative for PHIN VADS and historically for PHINMS."
phin-vads: "Public Health Information Network Vocabulary Access and Distribution System. A CDC-hosted repository of standardized vocabulary and code sets used in public health messaging."
phinms: "Public Health Information Network Messaging System. A legacy CDC messaging system for transmitting surveillance data. Being replaced by current standards."
phit: "Public Health Investigation Tools. The CDC branch within IRD that directly manages NBS."
pii: "Personally Identifiable Information. Data that can be used to identify, locate, or contact an individual."
pod: "The smallest deployable unit in Kubernetes. A pod contains one or more containers that share network and storage resources."
program-area: "At CDC, a category that groups related diseases or conditions for administrative and security purposes (for example, STD/HIV or Hepatitis). Users are assigned to program areas as part of their role."
rbac: "Role-Based Access Control. An access management principle that restricts resource access based on a user's job role rather than individual identity."
rdb: "Reporting Database. The NBS database that stores flattened data for reporting and analysis. Populated by MasterETL (legacy path) or RTR (modern path). See also RDB_Modern."
rdb-modern: "The modernized reporting database in NBS 7, populated by the RTR pipeline. RDB_Modern runs alongside the legacy RDB during the migration period."
amazon-rds: "Amazon Relational Database Service. An AWS managed database service. Azure SQL services are the Azure equivalent of Amazon RDS."
reportability-response: "Reportability Response (RR). A structured message returned to an originating EHR system after an eICR is received and processed. The RR confirms whether the reported condition is reportable and to which jurisdiction. The RR is part of the eICR two-way exchange workflow and is generated by NBS after the DI API forwards the eICR."
reportable-disease: "A disease or condition that providers are required to report to the local or state health department under jurisdiction law. Distinct from notifiable disease, which refers to federal reporting requirements to CDC."
role: "In NBS, the combination of a permission set, program area or areas, jurisdiction or jurisdictions, and access level assigned to a user. A user may have multiple roles."
rr: "See Reportability Response."
rtr: "Real-Time Reporting. An NBS 7 reporting pipeline that replaces the batch ETL approach with event-driven data movement using Kafka. RTR coexists with MasterETL during the NBS 7 migration period."
rxnorm: "A standard code system for medications."
amazon-s3: "Amazon Simple Storage Service. AWS object storage. In Azure deployments, Azure Blob Storage serves the same function."
saml: "Security Assertion Markup Language. A standard for exchanging authentication and authorization data. Used for SSO integrations with Keycloak."
sas: "Statistical Analysis System. Analytics software used with Classic NBS for reporting. Referenced in NBS 6 compatibility documentation."
sbom: "Software Bill of Materials. A formal, machine-readable inventory of the software components, dependencies, and libraries used to build an application. SBOMs identify vulnerable or outdated components in a software supply chain."
service-mesh: "An infrastructure layer that manages service-to-service communication within a distributed application, providing encryption, observability, and traffic management."
sla: "Service Level Agreement. A contract defining service performance expectations. A STLT may be required to establish an SLA with a new service provider (for example, a cloud service provider)."
snomed-ct: "Systematized Nomenclature of Medicine - Clinical Terms. A standard code system identifying clinical findings and organisms."
sql: "Structured Query Language. A standard language for managing and querying relational databases."
srt-srte: "System Reference Tables (Enterprise). The NBS database that stores standard code sets including LOINC, SNOMED CT, RxNorm, and FIPS codes. Used for code mapping during ELR processing and jurisdiction derivation."
sso: "Single Sign-On. An authentication method that allows users to log in once to access multiple systems."
stlt: "State, Territorial, Local, and Tribal. The jurisdictions that operate NBS day-to-day. STLTs are the primary audience for this guide. Pronounced \"stilt.\""
strangler-fig-pattern: "A software migration strategy in which new functionality is built alongside a legacy system and gradually replaces it, rather than rewriting everything at once."
subnet: "A subdivision of a VPC's IP address range. Subnets are used to isolate internet-facing components from internal services."
terraform: "An open-source infrastructure-as-code tool for provisioning and managing cloud resources. In AWS deployments, the scripts provision resources including Amazon EKS, Amazon VPC, Amazon MSK, and Amazon EFS. In Azure deployments, the scripts provision resources including AKS, VNet, HDInsight, and Azure Files."
tls: "Transport Layer Security. A cryptographic protocol that secures data in transit."
traefik: "An open-source ingress controller and reverse proxy."
transfer-of-ownership: "The act of reassigning an observation or case investigation from one jurisdiction or program area to another. The receiving owner becomes responsible for investigation and resolution tasks."
values-file: "A YAML configuration file that supplies environment-specific settings to a Helm chart during deployment."
azure-vnet: "Azsure Virtual Network. An isolated cloud network in Azure. The AWS equivalent of VNet is Amazon VPC."
amazon-vpc: "Amazon Virtual Private Cloud. An isolated cloud network in AWS. The AWS equivalent of VNet. See also peering and subnet."
wds: "Workflow Decision Support. An NBS application feature that automates processing of incoming ELR and eCR data. For example, automatically creating case investigations or marking documents as reviewed. System administrators configure the permission sets and security derivation that WDS depends on; changes to WDS behavior in the NBS_Configuration table require a WildFly restart."
wildfly: "An open-source Java application server used as a runtime environment."
worker-node: "A physical or virtual machine in a Kubernetes cluster that runs containerized workloads (pods). Worker nodes are managed by you; the control plane schedules work onto them and monitors their health. In Amazon EKS deployments, worker nodes run as EC2 instances provisioned through managed node groups. In AKS deployments, they are provisioned as node pools."
